<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chevron Lines - Secure Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --primary: #0f172a;
            --accent: #2563eb;
            --border: rgba(255, 255, 255, 0.4);
            --admin-color: #dc2626;
        }

        * { box-sizing: border-box; }
        html, body { 
            height: 100vh; margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #cbd5e1 0%, #f8fafc 100%);
        }

        .main-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 12px; }

        .container {
            display: flex; flex-direction: column; flex: 1;
            background: var(--glass); backdrop-filter: blur(12px);
            border-radius: 12px; border: 1px solid var(--border);
            padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .corp-header { position: relative; text-align: center; margin-bottom: 10px; }
        .corp-header h1 { margin: 0; font-size: 1.2rem; color: var(--primary); font-weight: 800; }
        .corp-header p { margin: 1px 0; font-size: 0.7rem; color: #475569; }

        .top-right-tools {
            position: absolute; right: 0; top: 0;
            display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
        }

        .top-counter { font-weight: 700; font-size: 0.8rem; color: var(--accent); border-bottom: 2px solid var(--accent); }
        #adminStatus { font-size: 0.6rem; font-weight: 800; color: var(--admin-color); display: none; }

        #entryWrapper { display: none; margin-bottom: 12px; }

        .entry-section { background: rgba(255, 255, 255, 0.8); padding: 12px; border-radius: 8px; border: 2px solid var(--accent); }
        .entry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; align-items: flex-end; }

        .filter-section {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: flex-end;
            padding: 10px; background: rgba(37, 99, 235, 0.05); border-radius: 8px;
        }
        .filter-item { flex: 1; min-width: 110px; }

        label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #64748b; display: block; margin-bottom: 3px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 0.75rem; background: white; }

        .table-container { flex: 1; overflow: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { position: sticky; top: 0; background: #f1f5f9; padding: 10px; text-align: left; font-size: 0.65rem; color: #334155; z-index: 10; border-bottom: 2px solid #cbd5e1; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.72rem; }

        .col-sl { width: 40px; }
        .col-job { width: 70px; }
        .col-imp { width: 180px; } 
        .col-desc { width: 180px; } 
        .col-num { width: 100px; } 
        .col-date { width: 90px; }
        .col-duty { width: 90px; }
        .col-sts { width: 85px; }
        .col-act { width: 110px; }

        .tag { padding: 3px 6px; border-radius: 4px; font-weight: 800; font-size: 0.6rem; }
        .YELLOW { background: #fef3c7; color: #92400e; }
        .RED { background: #fee2e2; color: #b91c1c; }

        .btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: 700; font-size: 0.7rem; transition: 0.2s; }
        .btn-toggle { background: #0f172a; color: white; margin-bottom: 10px; border-left: 4px solid var(--accent); display: none; }
        .btn-lock { background: #cbd5e1; color: #0f172a; padding: 5px 10px; font-size: 0.65rem; }
        .btn-add { background: var(--accent); color: white; width: 100%; }
        .btn-print { background: var(--accent); color: white; }
        .btn-edit { background: #64748b; color: white; }

        .admin-only { display: none !important; }
        .print-header-info { display: none; }

        @media print {
            @page { size: landscape; margin: 5mm; }
            html, body { height: auto !important; overflow: visible !important; background: white; }
            .main-wrapper { height: auto !important; padding: 0; display: block; }
            .container { height: auto !important; display: block; border: none; box-shadow: none; padding: 0; overflow: visible !important; }
            .print-header-info { display: block; border-bottom: 2px solid #000; margin-bottom: 15px; padding-bottom: 5px; font-size: 0.85rem; }
            .table-container { height: auto !important; overflow: visible !important; display: block; border: none; }
            table { min-width: 100% !important; width: 100% !important; table-layout: auto !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th { position: static !important; background: #eee !important; color: black !important; border: 1px solid #000 !important; }
            td { border: 1px solid #000 !important; white-space: normal !important; word-wrap: break-word; }
            .no-print, .btn-col, .btn-lock, .admin-only, #adminStatus { display: none !important; }
        }

        @media (max-width: 600px) {
            .corp-header h1 { font-size: 1rem; padding-right: 70px; text-align: left; }
            .filter-item { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div class="corp-header">
            <h1>Chevron Lines (C&F) Limited</h1>
            <p>Aziz Court (5th Floor) 88-90, Agrabad C/A, Chittagong.</p>
            <div class="top-right-tools no-print">
                <div class="top-counter">R: <span id="main_count">0</span></div>
                <div id="adminStatus">ADMIN</div>
                <button class="btn btn-lock" id="lockBtn" onclick="handleSecurity()">🔓 Login</button>
            </div>
        </div>

        <div class="print-header-info">
            <div style="display:flex; justify-content: space-between;">
                <b><span id="print_range_text">All Records</span></b>
                <span>Print Date: <span id="print_now_date"></span></span>
            </div>
        </div>

        <button class="btn btn-toggle no-print admin-only" id="newEntryBtn" onclick="toggleEntry()">+ New Data Entry</button>

        <div id="entryWrapper" class="no-print admin-only">
            <div class="entry-section">
                <div class="entry-grid">
                    <div><label>Job</label><input type="text" id="job_in"></div>
                    <div><label>Importer</label><input type="text" id="imp_in" list="imp_suggestions"><datalist id="imp_suggestions"></datalist></div>
                    <div><label>Description</label><input type="text" id="desc_in" list="desc_suggestions"><datalist id="desc_suggestions"></datalist></div>
                    <div><label>BL No</label><input type="text" id="bl_in"></div>
                    <div><label>LC No</label><input type="text" id="lc_in"></div>
                    <div><label>BoE No</label><input type="text" id="boe_n_in"></div>
                    <div><label>BoE Date</label><input type="date" id="boe_d_in"></div>
                    <div><label>Duty</label><input type="text" id="duty_in"></div>
                    <div><label>Status</label><select id="ry_in"><option>YELLOW</option><option>RED</option></select></div>
                    <div><button class="btn btn-add" onclick="addData()">Save</button></div>
                </div>
            </div>
        </div>

        <div class="filter-section no-print">
            <div class="filter-item"><label>BoE Date Search</label><input type="text" id="boeDateFilter" placeholder="DD-MM-YY" onkeyup="applyFilters()"></div>
            <div class="filter-item"><label>Ass. Date From</label><input type="date" id="assFrom" onchange="applyFilters()"></div>
            <div class="filter-item"><label>Ass. Date To</label><input type="date" id="assTo" onchange="applyFilters()"></div>
            
            <div class="filter-item"><label>View</label><select id="viewMode" onchange="applyFilters()">
                <option value="pending" selected>Non-Assessed</option>
                <option value="all">Full Database</option>
                <option value="completed">Assessed</option>
                <option value="combined">Date View + Pendings</option>
            </select></div>
            <div class="filter-item" style="flex: 2;"><label>Global Search</label><input type="text" id="searchInput" placeholder="Search..." onkeyup="applyFilters()"></div>
            <button class="btn btn-print" onclick="preparePrint()">Print</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-sl">SL</th>
                        <th class="col-job">Job</th>
                        <th class="col-imp">Importer Name</th>
                        <th class="col-desc">Description</th>
                        <th class="col-num">BL No</th>
                        <th class="col-num">LC No</th>
                        <th class="col-num">BoE No</th>
                        <th class="col-date">BoE Date</th>
                        <th class="col-duty">Duty</th>
                        <th class="col-sts">Status</th>
                        <th class="col-date">Ass. Date</th>
                        <th class="col-act btn-col">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://vhlzalgatarrrobjympc.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZobHphbGdhdGFycnJvYmp5bXBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODI3ODksImV4cCI6MjA5MTU1ODc4OX0.DngGAcPst8pUwcz4NpuXEYdEk70BQoqOjXS78bAv8FU';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let assessments = [];
    let editId = null;
    let isAdmin = false;
    const SECRET_PASSWORD = "123";

    // Converts browser date (YYYY-MM-DD) to Database format (DD-MM-YY)
    function formatToDB(dateVal) {
        if (!dateVal) return null;
        const [y, m, d] = dateVal.split('-');
        return `${d}-${m}-${y.slice(-2)}`;
    }

    // Converts Database format (DD-MM-YY) to Browser date (YYYY-MM-DD)
    function formatToInput(dbVal) {
        if (!dbVal || dbVal === '-') return '';
        const parts = dbVal.split('-');
        if (parts.length < 3) return '';
        return `20${parts[2]}-${parts[1]}-${parts[0]}`;
    }

    function parseDateStr(str) {
        if (!str || str.length < 8) return null;
        const parts = str.split('-');
        return new Date(2000 + parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    }

    function handleSecurity() {
        if (!isAdmin) {
            const pass = prompt("Enter Admin Password:");
            if (pass === SECRET_PASSWORD) {
                isAdmin = true;
                document.getElementById('lockBtn').innerText = "🔒 Logout";
                document.getElementById('adminStatus').style.display = "block";
                enableAdminUI();
            } else { alert("Wrong password!"); }
        } else {
            isAdmin = false;
            document.getElementById('lockBtn').innerText = "🔓 Login";
            document.getElementById('adminStatus').style.display = "none";
            disableAdminUI();
        }
        applyFilters();
    }

    function enableAdminUI() {
        document.querySelectorAll('.admin-only').forEach(el => el.style.setProperty('display', 'block', 'important'));
    }

    function disableAdminUI() {
        document.querySelectorAll('.admin-only').forEach(el => el.style.setProperty('display', 'none', 'important'));
    }

    function toggleEntry() {
        const wrapper = document.getElementById('entryWrapper');
        wrapper.style.display = (wrapper.style.display === "none" || wrapper.style.display === "") ? "block" : "none";
    }

    async function fetchData() {
        const { data, error } = await _supabase.from('assessments').select('*').order('id', { ascending: true });
        if (!error) { assessments = data; updateSuggestions(); applyFilters(); }
    }

    function applyFilters() {
        const boeD = document.getElementById('boeDateFilter').value.trim().toLowerCase();
        const fromInput = document.getElementById('assFrom').value;
        const toInput = document.getElementById('assTo').value;
        const mode = document.getElementById('viewMode').value;
        const search = document.getElementById('searchInput').value.toLowerCase();

        const fromDate = fromInput ? new Date(fromInput) : null;
        if(fromDate) fromDate.setHours(0,0,0,0);
        const toDate = toInput ? new Date(toInput) : null;
        if(toDate) toDate.setHours(23,59,59,999);

        const filtered = assessments.filter(item => {
            const matchesSearch = Object.values(item).some(v => String(v).toLowerCase().includes(search));
            const matchesBoE = boeD === "" || (item.boe_date && item.boe_date.toLowerCase().includes(boeD));
            
            const itemAssDate = parseDateStr(item.ass_date);
            const isPending = !item.ass_date || item.ass_date.trim() === "" || item.ass_date === "-";

            let inRange = true;
            if (fromDate && itemAssDate) { if (itemAssDate < fromDate) inRange = false; }
            if (toDate && itemAssDate) { if (itemAssDate > toDate) inRange = false; }
            if ((fromDate || toDate) && !itemAssDate) inRange = false;

            if (mode === 'completed') return matchesSearch && matchesBoE && inRange && !isPending;
            if (mode === 'pending') return matchesSearch && matchesBoE && isPending;
            if (mode === 'combined') return matchesSearch && (inRange || isPending);
            return matchesSearch && matchesBoE && inRange;
        });

        document.getElementById('main_count').innerText = filtered.length;
        renderTable(filtered);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach((item, index) => {
            const tr = document.createElement('tr');
            if (editId === item.id) {
                tr.innerHTML = `
                    <td>${index+1}</td>
                    <td><input value="${item.job || ''}" id="e_job"></td>
                    <td><input value="${item.importer || ''}" id="e_imp"></td>
                    <td><input value="${item.description || ''}" id="e_desc"></td>
                    <td><input value="${item.bl_no || ''}" id="e_bl"></td>
                    <td><input value="${item.lc_no || ''}" id="e_lc"></td>
                    <td><input value="${item.boe_no || ''}" id="e_boe_n"></td>
                    <td><input type="date" value="${formatToInput(item.boe_date)}" id="e_boe_d"></td>
                    <td><input value="${item.duty || ''}" id="e_duty"></td>
                    <td><select id="e_ry"><option ${item.ry_status=='YELLOW'?'selected':''}>YELLOW</option><option ${item.ry_status=='RED'?'selected':''}>RED</option></select></td>
                    <td><input type="date" value="${formatToInput(item.ass_date)}" id="e_ass"></td>
                    <td class="btn-col"><button class="btn btn-add" onclick="saveEdit(${item.id})">Save</button></td>`;
            } else {
                tr.innerHTML = `
                    <td>${index+1}</td><td>${item.job || ''}</td>
                    <td style="white-space:normal; min-width:180px">${item.importer || ''}</td>
                    <td style="white-space:normal; min-width:180px">${item.description || ''}</td>
                    <td>${item.bl_no || ''}</td><td>${item.lc_no || ''}</td><td>${item.boe_no || ''}</td>
                    <td style="font-weight:700">${item.boe_date || ''}</td>
                    <td>${item.duty || ''}</td>
                    <td><span class="tag ${item.ry_status}">${item.ry_status}</span></td>
                    <td style="font-weight:700; color:var(--accent)">${item.ass_date || '-'}</td>
                    <td class="btn-col">
                        ${isAdmin ? `
                            <button class="btn btn-edit" onclick="startEdit(${item.id})">Edit</button>
                            <button class="btn" style="color:red; background:none" onclick="deleteRecord(${item.id})">X</button>
                        ` : '<span style="color:#94a3b8; font-size:0.6rem">VIEW ONLY</span>'}
                    </td>`;
            }
            tbody.appendChild(tr);
        });
    }

    async function addData() {
        if(!isAdmin) return;
        const entry = {
            job: document.getElementById('job_in').value, importer: document.getElementById('imp_in').value,
            description: document.getElementById('desc_in').value, bl_no: document.getElementById('bl_in').value,
            lc_no: document.getElementById('lc_in').value, boe_no: document.getElementById('boe_n_in').value,
            boe_date: formatToDB(document.getElementById('boe_d_in').value), duty: document.getElementById('duty_in').value,
            ry_status: document.getElementById('ry_in').value, ass_date: null
        };
        const { error } = await _supabase.from('assessments').insert([entry]);
        if (!error) { fetchData(); clearInputs(); toggleEntry(); }
    }

    function startEdit(id) { editId = id; applyFilters(); }

    async function saveEdit(id) {
        if(!isAdmin) return;
        const updated = {
            job: document.getElementById('e_job').value, importer: document.getElementById('e_imp').value,
            description: document.getElementById('e_desc').value, bl_no: document.getElementById('e_bl').value,
            lc_no: document.getElementById('e_lc').value, boe_no: document.getElementById('e_boe_n').value,
            boe_date: formatToDB(document.getElementById('e_boe_d').value), duty: document.getElementById('e_duty').value,
            ry_status: document.getElementById('e_ry').value, ass_date: formatToDB(document.getElementById('e_ass').value) || null
        };
        const { error } = await _supabase.from('assessments').update(updated).eq('id', id);
        if (!error) { editId = null; await fetchData(); }
    }

    async function deleteRecord(id) { 
        if(!isAdmin) return;
        if(confirm("Delete record?")) { await _supabase.from('assessments').delete().eq('id', id); fetchData(); } 
    }
    
    function preparePrint() { 
        const from = document.getElementById('assFrom').value;
        const to = document.getElementById('assTo').value;
        const mode = document.getElementById('viewMode').value;
        
        let headerText = "";
        if (from && to) headerText = `Records From ${from} to ${to}`;
        else if (from) headerText = `Records from ${from}`;
        else if (to) headerText = `Records up to ${to}`;
        else headerText = "Full Database Report";

        if (mode === 'combined') headerText += " (+ Pending List)";
        if (mode === 'pending') headerText = "Pending Assessment List";

        document.getElementById('print_range_text').innerText = headerText;
        document.getElementById('print_now_date').innerText = new Date().toLocaleDateString('en-GB');
        window.print(); 
    }

    function clearInputs() { 
        document.querySelectorAll('.entry-grid input').forEach(i => i.value = ''); 
    }

    function updateSuggestions() {
        const imps = [...new Set(assessments.map(i => i.importer).filter(Boolean))];
        const descs = [...new Set(assessments.map(i => i.description).filter(Boolean))];
        document.getElementById('imp_suggestions').innerHTML = imps.map(i => `<option value="${i}">`).join('');
        document.getElementById('desc_suggestions').innerHTML = descs.map(i => `<option value="${i}">`).join('');
    }
    fetchData();
</script>
</body>
</html>
